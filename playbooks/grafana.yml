---
- hosts: toshibaserver
  name: Install Grafana
  become: true
  vars:
    install:
    deb_key: "deb https://packages.grafana.com/enterprise/deb stable main"
  tasks:
  - name: Add an apt key by id from a keyserver
    apt_key:
      url: https://packages.grafana.com/gpg.key
      state: present
  - apt_repository:
      repo: "{{ deb_key }}"
      state: present
      update_cache: yes
  - name: Install Grafana
    become: yes
    apt:
      name: grafana
  - name: Enable Grafana Service
    become: yes
    service:
      name: grafana-server
      state: started
      enabled: yes
  - name: Check if port 3000 is available
    wait_for:
      host: "{{ ansible_hostname }}"
      port: 4000
      state: started
      timeout: 30      
